<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Love</title>
    <style>
        :root { --main-pink: #ff4d6d; --bg-cream: #fff5f5; }
        body { background: var(--bg-cream); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; color: #333; }
        .container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 80%; }
        h1 { color: var(--main-pink); }
        .btn { background: var(--main-pink); color: white; padding: 15px 30px; border-radius: 25px; text-decoration: none; font-weight: bold; display: inline-block; margin-top: 20px; transition: 0.3s; }
        .btn:hover { transform: scale(1.05); }
        .hidden { display: none; }
        #countdown { font-size: 1.2rem; font-weight: bold; margin-top: 15px; color: #777; }
    </style>
</head>
<body>

    <div class="container" id="locked-section">
        <h1>Gotcha! ❤️</h1>
        <p>I know you're curious, but the magic happens on May 30th.</p>
        <div id="countdown"></div>
    </div>

    <div class="container hidden" id="unlocked-section">
        <h1>Happy Anniversary Baby! ❤️</h1>
        <p>Your surprise is finally ready.</p>
        <a href="dashboard.html" class="btn">Enter Our Universe</a>
    </div>

    <script>
        function updateGate() {
            const target = new Date('May 30, 2026 00:00:00').getTime();
            const now = new Date().getTime();
            const diff = target - now;

            if (diff <= 0) {
                document.getElementById('locked-section').classList.add('hidden');
                document.getElementById('unlocked-section').classList.remove('hidden');
            } else {
                const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((diff % (1000 * 60)) / 1000);
                document.getElementById('countdown').innerHTML = `Only ${d}d ${h}h ${m}m ${s}s to go!`;
            }
        }
        updateGate();
        setInterval(updateGate, 1000);
    </script>
</body>
</html>
